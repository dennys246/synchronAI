# Video Data Configuration

# Paths (override via CLI)
labels_file: "data/labels.csv"
video_dir: null  # Set via --video-dir

# Preprocessing
preprocessing:
  label_encoding:
    a: 0  # asynchronous
    s: 1  # synchronous
  conflict_strategy: "last"  # last, first, error

# Frame sampling
sample_fps: 12.0
window_seconds: 1.0
frame_size: 640

# Video backend
video_backend: "auto"  # auto, decord, pyav, opencv
reader_pool_size: 8

# Augmentation
augmentation:
  enabled: true
  horizontal_flip: 0.5
  color_jitter: true
  temporal_jitter_frames: 2
