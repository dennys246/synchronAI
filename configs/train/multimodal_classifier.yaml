# Multi-Modal Classifier Training Configuration
# Combines video (DINOv2 + temporal) and audio (Whisper/WavLM) for synchrony prediction

# Video model configuration
video:
  backbone: "dinov2-base"  # dinov2-small, dinov2-base, dinov2-large (Apache 2.0)
  # backbone: "yolo26s"  # Legacy YOLO (AGPL-3.0): yolo26n, yolo26s, etc.
  temporal_aggregation: "lstm"  # mean, max, attention, lstm
  hidden_dim: 256
  dropout: 0.3
  freeze_backbone: true  # For stage 1

  # Video data
  sample_fps: 12.0
  window_seconds: 2.0
  frame_size: 224  # 224 for DINOv2, 640 for YOLO

# Audio model configuration
audio:
  model_name: "large-v3"  # Whisper: tiny, base, small, medium, large, large-v2, large-v3
  # model_name: "wavlm-large"  # WavLM (recommended): wavlm-large, wavlm-base-plus
  pooling_mode: "mean"  # mean, max, first, last
  hidden_dim: 256
  dropout: 0.3
  freeze_encoder: true  # For stage 1
  num_event_classes: 7  # speech, laughter, crying, babbling, silence, noise, music

  # Audio data
  sample_rate: 16000
  chunk_duration: 1.0

# Fusion configuration
fusion:
  type: "concat"  # concat, cross_attention (no-op with single tokens), gated
  hidden_dim: 256
  num_heads: 4  # For cross_attention (when temporal sequences are available)
  dropout: 0.3

# Training configuration
training:
  epochs: 50
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  use_amp: true
  num_workers: 4  # Use 4 workers for parallel data loading (set to 0 if /dev/shm is limited)
  gradient_clip_max_norm: 1.0
  label_smoothing: 0.05

  # Two-stage fine-tuning
  stage1_epochs: 5  # Fusion + heads only (frozen backbones)
  video_backbone_lr: 1.0e-5  # Stage 2
  audio_encoder_lr: 1.0e-5  # Stage 2
  fusion_head_lr: 5.0e-5  # Stage 2 (backbone_lr × 5)
  stage2_warmup_epochs: 3

  # Learning rate schedule
  scheduler: "cosine"
  warmup_epochs: 2  # Stage 1 warmup

  # Multi-task loss weights
  sync_loss_weight: 0.6  # Primary task (synchrony prediction)
  event_loss_weight: 0.4  # Auxiliary task (audio event classification)

  # Early stopping
  early_stopping_patience: 15

  # Checkpointing
  save_interval: 5  # Save checkpoint every N epochs

  # Heatmap visualization (optional)
  heatmap_epoch_interval: 0  # Generate heatmap every N epochs (0 = disabled, e.g., 5 = every 5 epochs)
  heatmap_video_path: null  # Path to sample video (auto-selected from training data if not specified)

# Data split configuration
split:
  val_split: 0.2
  group_by: "subject_id"  # video_path or subject_id (prevents leakage)

# Transfer Learning Configuration
# ================================
# Three strategies available:
#
# 1. DEFAULT (pretrained backbones):
#    - Don't set pretrained paths
#    - Uses pretrained DINOv2 (Meta) + Whisper/WavLM backbones
#    - Heads trained from scratch
#
# 2. LOAD COMPLETE MODELS:
#    pretrained:
#      video: "runs/video_classifier/best.pt"
#      audio: "runs/audio_classifier/best.pt"
#      load_heads_only: false
#    - Loads your fully trained models (backbones + heads)
#
# 3. LOAD HEADS ONLY (RECOMMENDED):
#    pretrained:
#      video: "runs/video_classifier/best.pt"
#      audio: "runs/audio_classifier/best.pt"
#      load_heads_only: true
#    - Keeps strong pretrained DINOv2/Whisper backbones
#    - Uses your trained heads adapted to the synchrony task
#
pretrained:
  video: null  # Path to your trained video model (optional)
  audio: null  # Path to your trained audio model (optional)
  load_heads_only: true  # true = keep pretrained backbones, false = load everything

# Reproducibility
seed: 42
deterministic: false
