# Video Classifier Training Configuration

# Model configuration
model:
  backbone: "dinov2-base"  # dinov2-small, dinov2-base, dinov2-large (Apache 2.0)
  # backbone: "yolo26s"  # Legacy YOLO (AGPL-3.0): yolo26n, yolo26s, yolo26m, etc.
  temporal_aggregation: "lstm"  # mean, max, attention, lstm
  hidden_dim: 256
  dropout: 0.3
  freeze_backbone: true

# Data configuration
data:
  sample_fps: 12.0
  window_seconds: 2.0
  frame_size: 224  # 224 for DINOv2, 640 for YOLO
  augment: true
  horizontal_flip_prob: 0.5
  color_jitter: true
  temporal_jitter_frames: 2
  random_erase_prob: 0.3
  gaussian_noise_std: 0.02
  mixup_alpha: 0.2

# Training configuration
training:
  epochs: 50
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  use_amp: true
  num_workers: 4  # Use 4 workers for parallel data loading (set to 0 if /dev/shm is limited)
  gradient_clip_max_norm: 1.0
  label_smoothing: 0.05

  # Two-stage fine-tuning
  stage1_epochs: 5  # Head-only training
  backbone_lr: 1.0e-5  # Lower LR for backbone in stage 2
  stage2_warmup_epochs: 3

  # Learning rate schedule
  scheduler: "cosine"
  warmup_epochs: 2

# Split configuration
split:
  val_split: 0.2
  group_by: "subject_id"  # video_path or subject_id

# Reproducibility
seed: 42
deterministic: false
